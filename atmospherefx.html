<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AtmosphereFX - 便携版</title>
<style>
/* === 全局重置与基础 === */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--panel-bg:rgba(0,0,0,0.7);--panel-border:rgba(255,255,255,0.12);--text-primary:rgba(255,255,255,0.9);--text-secondary:rgba(255,255,255,0.6);--accent:#4a9eff;--accent-hover:#6ab4ff;--radius:10px;--font-mono:'SF Mono','Cascadia Code','Fira Code',monospace}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;color:var(--text-primary);user-select:none}
#video-background{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0;display:none}
#video-background.active{display:block}
#canvas-container{position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none}
#render-canvas{width:100%;height:100%;display:block}
#canvas-container.interactive{pointer-events:auto}
.panel{position:absolute;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:var(--radius);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);z-index:10;min-width:220px;overflow:hidden;transition:opacity .25s ease}
.panel.hidden{display:none}
.panel-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;font-size:13px;font-weight:600;cursor:pointer;border-bottom:1px solid var(--panel-border);letter-spacing:.5px}
.toggle-arrow{font-size:10px;transition:transform .2s ease}
.panel.collapsed .toggle-arrow{transform:rotate(-90deg)}
.panel.collapsed .panel-content{display:none}
.panel-content{padding:10px 14px;max-height:320px;overflow-y:auto}
#status-bar{position:absolute;top:20px;left:20px;z-index:20;display:flex;gap:16px;align-items:center;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:8px;padding:8px 16px;font-size:12px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
#status-renderer{color:var(--text-secondary);font-family:var(--font-mono)}
#camera-panel{top:100px;left:20px}
#camera-list{list-style:none}
#camera-list li{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text-secondary);transition:all .15s ease;margin-bottom:2px}
#camera-list li:hover{background:rgba(255,255,255,0.1);color:var(--text-primary)}
#camera-list li.active{background:rgba(74,158,255,0.2);color:var(--accent)}
#camera-list li .cam-type{font-size:10px;opacity:.6;margin-left:6px}
#params-panel{top:20px;right:20px;width:260px}
.tab-bar{display:flex;gap:4px;margin-bottom:12px}
.tab-btn{flex:1;padding:6px 8px;border:1px solid var(--panel-border);border-radius:6px;background:transparent;color:var(--text-secondary);font-size:11px;cursor:pointer;transition:all .15s ease}
.tab-btn:hover{background:rgba(255,255,255,0.05)}
.tab-btn.active{background:rgba(74,158,255,0.2);border-color:var(--accent);color:var(--text-primary)}
.tab-content.hidden{display:none}
#toolbar{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);z-index:20;display:flex;gap:12px;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:12px;padding:8px 16px;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.tool-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border:1px solid var(--panel-border);border-radius:8px;background:transparent;color:var(--text-primary);font-size:12px;cursor:pointer;transition:all .15s ease;white-space:nowrap}
.tool-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.3)}
.tool-btn:active{transform:scale(.97)}
.tool-btn.primary{background:rgba(74,158,255,0.25);border-color:var(--accent)}
.tool-btn.primary:hover{background:rgba(74,158,255,0.4)}
.btn-icon{font-size:14px}
#loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
#loading-overlay.hidden{display:none}
.loading-spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,0.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading-text{font-size:14px;color:var(--text-secondary)}
.panel-content::-webkit-scrollbar{width:4px}
.panel-content::-webkit-scrollbar-track{background:transparent}
.panel-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
@media(max-width:768px){#toolbar{gap:6px;padding:6px 10px;bottom:16px}.tool-btn{padding:6px 10px;font-size:11px}#params-panel{width:220px}}
</style>
</head>
<body>

<video id="video-background" loop muted playsinline></video>

<div id="canvas-container">
  <canvas id="render-canvas"></canvas>
</div>

<div id="status-bar">
  <span id="status-text">就绪 — 请导入 FBX 模型</span>
  <span id="status-renderer"></span>
</div>

<div id="camera-panel" class="panel hidden">
  <div class="panel-header" id="camera-panel-toggle">
    <span>📷 摄像机</span>
    <span class="toggle-arrow">▼</span>
  </div>
  <ul id="camera-list" class="panel-content"></ul>
</div>

<div id="params-panel" class="panel hidden">
  <div class="panel-header" id="params-panel-toggle">
    <span>特效参数</span>
    <span class="toggle-arrow">▼</span>
  </div>
  <div class="panel-content">
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="particles">粒子</button>
      <button class="tab-btn" data-tab="smoke">烟雾</button>
      <button class="tab-btn" data-tab="godrays">光束</button>
    </div>
    <div class="tab-content" id="tab-particles"></div>
    <div class="tab-content hidden" id="tab-smoke"></div>
    <div class="tab-content hidden" id="tab-godrays"></div>
  </div>
</div>

<div id="toolbar">
  <button id="btn-import-fbx" class="tool-btn primary">
    <span class="btn-icon">📁</span>
    <span>导入 FBX</span>
  </button>
  <input type="file" id="fbx-file-input" accept=".fbx" hidden>
  <button id="btn-add-light" class="tool-btn">
    <span class="btn-icon">💡</span>
    <span>添加点光</span>
  </button>
  <button id="btn-add-cube" class="tool-btn">
    <span class="btn-icon">📦</span>
    <span>添加立方体</span>
  </button>
  <button id="btn-video-bg" class="tool-btn">
    <span class="btn-icon">🎬</span>
    <span>视频背景</span>
  </button>
  <button id="btn-reset-view" class="tool-btn">
    <span class="btn-icon">🔄</span>
    <span>重置视角</span>
  </button>
</div>

<div id="loading-overlay" class="hidden">
  <div class="loading-spinner"></div>
  <div id="loading-text">加载中...</div>
</div>

<script src="dist/app.bundle.js?v=3"></script>
</body>
</html>
